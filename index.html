<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>视频录制</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }
    #preview { width: 100vw; height: 100vh; object-fit: cover; }
    #timer {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 18px; font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5); z-index: 10;
    }
    #controls {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 20px; z-index: 10;
    }
    .btn {
      width: 80px; height: 80px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.2); color: #fff;
      font-size: 14px; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
    }
    .btn.recording { background: #ff4444; border-color: #ff6666; }
    .btn:disabled { opacity: 0.5; }
    #status {
      position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.7); font-size: 12px; z-index: 10;
      max-width: 80vw; text-align: center; word-break: break-all;
    }
    #back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 10;
      background: rgba(0,0,0,0.4); color: #fff; border: none;
      padding: 8px 16px; border-radius: 20px; font-size: 14px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <button id="back-btn">返回</button>
  <video id="preview" autoplay muted playsinline></video>
  <div id="timer">00:00</div>
  <div id="status">准备录制</div>
  <div id="controls">
    <button class="btn" id="toggleBtn">录制</button>
  </div>
  <script src="recorder.js"></script>
</body>
</html>
